<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Legajos - Acción Social</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-4">Gestión de Legajos</h1>
        
    
        <div class="card mb-4">
            <div class="card-header">
                <h3>Nuevo Legajo</h3>
            </div>
            <div class="card-body">
                <form th:action="@{/legajos/save}" th:object="${legajo}" method="post">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="numeroLegajo" class="form-label">Número de Legajo</label>
                                <input type="text" class="form-control" id="numeroLegajo" th:field="*{numeroLegajo}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="aprobadoDesaprobado" class="form-label">Estado</label>
                                <select class="form-select" id="aprobadoDesaprobado" th:field="*{aprobadoDesaprobado}">
                                    <option value="">Seleccionar estado</option>
                                    <option value="APROBADO">Aprobado</option>
                                    <option value="DESAPROBADO">Desaprobado</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="caso" class="form-label">Caso</label>
                                <select class="form-select" id="caso" th:field="*{caso.id}">
                                    <option value="">Seleccionar caso</option>
                                    <option th:each="caso : ${casos}" th:value="${caso.id}" 
                                            th:text="${caso.numeroCaso} + ' - ' + ${caso.apellido} + ', ' + ${caso.nombre}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="beneficio" class="form-label">Beneficio</label>
                                <select class="form-select" id="beneficio" th:field="*{beneficio.id}">
                                    <option value="">Seleccionar beneficio</option>
                                    <option th:each="beneficio : ${beneficios}" th:value="${beneficio.id}" 
                                            th:text="${beneficio.nombre}"></option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="descripcion" class="form-label">Descripción</label>
                        <textarea class="form-control" id="descripcion" th:field="*{descripcion}" rows="4"></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Guardar Legajo</button>
                    <a href="/legajos" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
        
      
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
