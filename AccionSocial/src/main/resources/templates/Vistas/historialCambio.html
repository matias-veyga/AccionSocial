<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Cambios - Acción Social</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-4">Historial de Cambios</h1>
        
       
        <div class="card mb-4">
            <div class="card-header">
                <h3>Registrar Cambio</h3>
            </div>
            <div class="card-body">
                <form th:action="@{/historial/save}" th:object="${historial}" method="post">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="caso" class="form-label">Caso</label>
                                <select class="form-select" id="caso" th:field="*{caso.id}">
                                    <option value="">Seleccionar caso</option>
                                    <option th:each="caso : ${casos}" th:value="${caso.id}" 
                                            th:text="${caso.numeroCaso} + ' - ' + ${caso.apellido} + ', ' + ${caso.nombre}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="fechaHora" class="form-label">Fecha y Hora</label>
                                <input type="datetime-local" class="form-control" id="fechaHora" th:field="*{fechaHora}">
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="campoModificado" class="form-label">Campo Modificado</label>
                                <input type="text" class="form-control" id="campoModificado" th:field="*{campoModificado}" 
                                       placeholder="Ej: Estado Civil, DNI, etc.">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="valorAnterior" class="form-label">Valor Anterior</label>
                                <input type="text" class="form-control" id="valorAnterior" th:field="*{valorAnterior}">
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="valorNuevo" class="form-label">Valor Nuevo</label>
                                <input type="text" class="form-control" id="valorNuevo" th:field="*{valorNuevo}">
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="observaciones" class="form-label">Observaciones</label>
                        <textarea class="form-control" id="observaciones" th:field="*{observaciones}" rows="3"></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Registrar Cambio</button>
                    <a href="/historial" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
        
        
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
