<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Beneficios - Acción Social</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-4">Gestión de Beneficios</h1>
        
        <div class="card mb-4">
            <div class="card-header">
                <h3>Nuevo Beneficio</h3>
            </div>
            <div class="card-body">
                <form th:action="@{/beneficios/save}" th:object="${beneficio}" method="post">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre del Beneficio</label>
                                <input type="text" class="form-control" id="nombre" th:field="*{nombre}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="estado" class="form-label">Estado</label>
                                <select class="form-select" id="estado" th:field="*{estado}">
                                    <option value="">Seleccionar estado</option>
                                    <option value="ACTIVO">Activo</option>
                                    <option value="INACTIVO">Inactivo</option>
                                    <option value="SUSPENDIDO">Suspendido</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="fechaInicio" class="form-label">Fecha de Inicio</label>
                                <input type="date" class="form-control" id="fechaInicio" th:field="*{fechaInicio}">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="fechaFin" class="form-label">Fecha de Fin</label>
                                <input type="date" class="form-control" id="fechaFin" th:field="*{fechaFin}">
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="tipoBeneficio" class="form-label">Tipo de Beneficio</label>
                        <select class="form-select" id="tipoBeneficio" th:field="*{tipoBeneficio.id}">
                            <option value="">Seleccionar tipo</option>
                            <option th:each="tipo : ${tiposBeneficio}" th:value="${tipo.id}" th:text="${tipo.unidadDeDatos} + ' - $' + ${tipo.montoCantidad}"></option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Guardar Beneficio</button>
                    <a href="/beneficios" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
        
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
