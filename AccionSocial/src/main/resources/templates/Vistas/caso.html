<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Casos - Acción Social</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        
   
        <div class="card mb-4">
            <div class="card-header">
                <h3>Nuevo Caso</h3>
            </div>
            <div class="card-body">
                <form th:action="@{/casos/save}" th:object="${caso}" method="post">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre</label>
                                <input type="text" class="form-control" id="nombre" th:field="*{nombre}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="apellido" class="form-label">Apellido</label>
                                <input type="text" class="form-control" id="apellido" th:field="*{apellido}" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="dni" class="form-label">DNI</label>
                                <input type="text" class="form-control" id="dni" th:field="*{dni}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="gmail" class="form-label">Email</label>
                                <input type="email" class="form-control" id="gmail" th:field="*{gmail}">
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="numeroCaso" class="form-label">Número de Caso</label>
                                <input type="text" class="form-control" id="numeroCaso" th:field="*{numeroCaso}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="estadoCivil" class="form-label">Estado Civil</label>
                                <select class="form-select" id="estadoCivil" th:field="*{estadoCivil}">
                                    <option value="">Seleccionar estado civil</option>
                                    <option value="SOLTERO">Soltero/a</option>
                                    <option value="CASADO">Casado/a</option>
                                    <option value="DIVORCIADO">Divorciado/a</option>
                                    <option value="VIUDO">Viudo/a</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="cantidadHijos" class="form-label">Cantidad de Hijos</label>
                                <input type="number" class="form-control" id="cantidadHijos" th:field="*{cantidadHijos}" min="0">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="localidad" class="form-label">Localidad</label>
                                <select class="form-select" id="localidad" th:field="*{localidad.id}">
                                    <option value="">Seleccionar localidad</option>
                                    <option th:each="loc : ${localidades}" th:value="${loc.id}" th:text="${loc.nombre}"></option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="nombreCalle" class="form-label">Nombre de la Calle</label>
                                <input type="text" class="form-control" id="nombreCalle" th:field="*{nombreCalle}">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="numeroDeCasa" class="form-label">Número de Casa</label>
                                <input type="text" class="form-control" id="numeroDeCasa" th:field="*{numeroDeCasa}">
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="descripcion" class="form-label">Descripción del Caso</label>
                        <textarea class="form-control" id="descripcion" th:field="*{descripcion}" rows="3"></textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="esAdultoMayor" th:field="*{esAdultoMayor}">
                                <label class="form-check-label" for="esAdultoMayor">
                                    Es Adulto Mayor
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="tieneDiscapacidad" th:field="*{tieneDiscapacidad}">
                                <label class="form-check-label" for="tieneDiscapacidad">
                                    Tiene Discapacidad
                                </label>
                            </div>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Guardar Caso</button>
                    <a href="/casos" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
